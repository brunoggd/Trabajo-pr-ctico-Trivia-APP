<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trivia</title>
    <link rel="stylesheet" href="css/styles.css">
    <script src="javascript/TriviaGAME.js"></script>
    <script src="javascript/TriviaAPI.js"></script>
    <script src="javascript/main.js"></script>
</head>
<body>
    <section class="general-wrapper fdr small-gap">
        <div id="contenedor-menu" class="question-container fdc">
            <h2 class="main-title">Trivia</h2>
            <h2 id="titulo-dificultad" class="title-2">Dificultad: Fácil</h2>
            <div class="container fdr margin-auto">
                <button id="boton-dif-facil" data-difficulty="easy" class="difficulty-button easy">Fácil</button>
                <button id="boton-dif-medio" data-difficulty="medium" class="difficulty-button medium">Medio</button>
                <button id="boton-dif-dificil" data-difficulty="hard" class="difficulty-button hard">Difícil</button>
            </div>
            <button id="boton-jugar" class="play-button margin-auto">Jugar</button>
        </div>
        <div id="contenedor-juego" class="wrapper margin-auto fdc">
            <div class="wrapper margin-auto small-gap">
                <h2 class="question-title">Pregunta 1 de 10</h2>
                <h2 class="question-title">Puntuación: 50</h2>
            </div>
            <div class="question-container fdc">
                <div class="wrapper custom-size-2 question-box-style">
                    <p class="question margin-auto">
                        ¿Te gustan las trivias?
                    </p>
                </div>
                <div class="wrapper fdr custom-size">
                    <button class="button margin-auto answer-bg-colour">Si</button>
                    <button class="button margin-auto answer-bg-colour">No</button>
                    <button class="button margin-auto answer-bg-colour">Tal vez</button>
                    <button class="button margin-auto answer-bg-colour">Eh?</button>
                </div>
            </div>
        </div>
    </section>
</body>
</html>
